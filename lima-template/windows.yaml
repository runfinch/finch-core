  script: |
    #!/bin/bash

    # Enable SSHing into the VM as root (e.g., in `nerdctlConfigApplier.Apply`).
    # TODO: do we need this on windows?
    # sudo cp ~/.ssh/authorized_keys /root/.ssh/
    
    # TODO: why does this fail on windows?
